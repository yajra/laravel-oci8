name: Continuous Integration

on:
  push:
    branches:
      - master
      - '*.x'
  pull_request:
  schedule:
    - cron: '0 0 * * *'

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: [8.3, 8.4, 8.5]
        stability: [prefer-stable]
        oracle: [11g, 19c, 21c, 23ai, 26ai]

    name: PHP ${{ matrix.php }} - ORACLE ${{ matrix.oracle }} - STABILITY ${{ matrix.stability }}

    services:
      oracle:
        image: >-
          ${{ matrix.oracle == '11g' && 'deepdiver/docker-oracle-xe-11g:2.0' ||
          matrix.oracle == '19c' &&
          'container-registry.oracle.com/database/adb-free:25.10.2.1' ||
          matrix.oracle == '21c' &&
          'container-registry.oracle.com/database/express:21.3.0-xe' ||
          matrix.oracle == '23ai' &&
          'container-registry.oracle.com/database/adb-free:25.9.3.2-23ai-amd64' ||
          matrix.oracle == '26ai' &&
          'container-registry.oracle.com/database/free:23.26.1.0' }}

        ports:
          - 1521:1521
        env:
          ORACLE_PWD: ${{ (matrix.oracle == '11g' || matrix.oracle == '21c' || matrix.oracle == '26ai') && 'oracle' || '' }}
          ADMIN_PASSWORD: ${{ (matrix.oracle == '19c' || matrix.oracle == '23ai') && 'SecureDb1234' || '' }}
          WALLET_PASSWORD: ${{ (matrix.oracle == '19c' || matrix.oracle == '23ai') && 'DummyWallet123' || '' }}
        options: >-
          --health-cmd="bash -lc 'echo > /dev/tcp/127.0.0.1/1521'"
          --health-interval=30s
          --health-timeout=10s
          --health-retries=20
          --health-start-period=20m

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: oci8
          tools: composer:v2
          coverage: xdebug

      - name: Install dependencies
        uses: nick-invision/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 5
          command: composer update --${{ matrix.stability }} --prefer-dist --no-interaction --no-progress

      - name: Initialize Oracle users
        run: |
          TEST_USER="laravel_oci8"
          TEST_PASSWORD="LaravelOci8_123!"
          SECOND_USER="second_connection"
          SECOND_PASSWORD="second_connection"

          if [ "${{ matrix.oracle }}" = "11g" ]; then
            SQLPLUS_PATH="/u01/app/oracle/product/11.2.0/xe/bin/sqlplus -L"
            ORACLE_ENV="export ORACLE_HOME=/u01/app/oracle/product/11.2.0/xe; export PATH=\$ORACLE_HOME/bin:\$PATH; export LD_LIBRARY_PATH=\$ORACLE_HOME/lib:\$LD_LIBRARY_PATH;"
            LOGIN="system/oracle@XE"
          elif [ "${{ matrix.oracle }}" = "21c" ]; then
            SQLPLUS_PATH="sqlplus -L"
            ORACLE_ENV=""
            LOGIN="system/oracle@XEPDB1"
          elif [ "${{ matrix.oracle }}" = "26ai" ]; then
            SQLPLUS_PATH="sqlplus -L"
            ORACLE_ENV=""
            LOGIN="system/oracle@FREEPDB1"
          else
            SQLPLUS_PATH="sqlplus -L"
            ORACLE_ENV="export TNS_ADMIN=/u01/app/oracle/wallets/tls_wallet;"
            LOGIN="admin/SecureDb1234@myatp_low"
          fi
          WAIT_CMD="$ORACLE_ENV echo 'select 1 from dual;' | $SQLPLUS_PATH -s $LOGIN"

          for i in {1..60}; do
            if docker exec -u oracle ${{ job.services.oracle.id }} bash -lc "$WAIT_CMD" >/dev/null 2>&1; then
              break
            fi

            if [ "$i" -eq 60 ]; then
              echo "Oracle did not become SQLPlus-ready"
              exit 1
            fi

            sleep 10
          done

          if [ "${{ matrix.oracle }}" = "19c" ] || [ "${{ matrix.oracle }}" = "23ai" ]; then
            SECOND_PASSWORD="SecondConnection1!"

            docker exec -u oracle ${{ job.services.oracle.id }} bash -lc "
            $ORACLE_ENV
            echo \"
            BEGIN EXECUTE IMMEDIATE 'DROP USER $TEST_USER CASCADE'; EXCEPTION WHEN OTHERS THEN NULL; END;
            /
            BEGIN EXECUTE IMMEDIATE 'DROP USER $SECOND_USER CASCADE'; EXCEPTION WHEN OTHERS THEN NULL; END;
            /
            CREATE USER $TEST_USER IDENTIFIED BY \\\"$TEST_PASSWORD\\\";
            CREATE USER $SECOND_USER IDENTIFIED BY \\\"$SECOND_PASSWORD\\\";
            GRANT CREATE SESSION TO $TEST_USER;
            GRANT CREATE TABLE TO $TEST_USER;
            GRANT CREATE SEQUENCE TO $TEST_USER;
            GRANT CREATE TRIGGER TO $TEST_USER;
            GRANT CREATE PROCEDURE TO $TEST_USER;
            GRANT CREATE VIEW TO $TEST_USER;
            GRANT CREATE TYPE TO $TEST_USER;
            GRANT SELECT ON V_\\$SESSION TO $TEST_USER;
            ALTER USER $TEST_USER QUOTA UNLIMITED ON DATA;
            GRANT CREATE SESSION TO $SECOND_USER;
            GRANT CREATE TABLE TO $SECOND_USER;
            GRANT CREATE SEQUENCE TO $SECOND_USER;
            GRANT CREATE TRIGGER TO $SECOND_USER;
            GRANT CREATE PROCEDURE TO $SECOND_USER;
            GRANT CREATE VIEW TO $SECOND_USER;
            GRANT CREATE TYPE TO $SECOND_USER;
            GRANT SELECT ON V_\\$SESSION TO $SECOND_USER;
            ALTER USER $SECOND_USER QUOTA UNLIMITED ON DATA;
            \" | $SQLPLUS_PATH -s $LOGIN
            "
          else
            docker exec -u oracle ${{ job.services.oracle.id }} bash -lc "
            $ORACLE_ENV
            echo \"
            BEGIN EXECUTE IMMEDIATE 'DROP USER $TEST_USER CASCADE'; EXCEPTION WHEN OTHERS THEN NULL; END;
            /
            BEGIN EXECUTE IMMEDIATE 'DROP USER $SECOND_USER CASCADE'; EXCEPTION WHEN OTHERS THEN NULL; END;
            /
            CREATE USER $TEST_USER IDENTIFIED BY \\\"$TEST_PASSWORD\\\";
            CREATE USER $SECOND_USER IDENTIFIED BY \\\"$SECOND_PASSWORD\\\";
            GRANT CREATE SESSION TO $TEST_USER;
            GRANT CREATE SESSION TO $SECOND_USER;
            GRANT DBA TO $TEST_USER;
            GRANT DBA TO $SECOND_USER;
            \" | $SQLPLUS_PATH -s $LOGIN
            "
          fi

      - name: Debug versions
        run: |
          echo "PHP:"
          php -v
          echo
          echo "Composer:"
          composer --version
          echo
          echo "Oracle database version:"
          if [ "${{ matrix.oracle }}" = "11g" ]; then
            docker exec -u oracle ${{ job.services.oracle.id }} bash -lc "
            export ORACLE_HOME=/u01/app/oracle/product/11.2.0/xe
            export PATH=\$ORACLE_HOME/bin:\$PATH
            export LD_LIBRARY_PATH=\$ORACLE_HOME/lib:\$LD_LIBRARY_PATH
            echo \"set heading off feedback off pagesize 0 verify off
            select banner_full from v\\\$version where banner_full like 'Oracle Database%';
            exit;\" | /u01/app/oracle/product/11.2.0/xe/bin/sqlplus -L -s system/oracle@XE
            "
          elif [ "${{ matrix.oracle }}" = "21c" ]; then
            docker exec -u oracle ${{ job.services.oracle.id }} bash -lc "
            echo \"set heading off feedback off pagesize 0 verify off
            select banner_full from v\\\$version where banner_full like 'Oracle Database%';
            exit;\" | sqlplus -L -s system/oracle@XEPDB1
            "
          elif [ "${{ matrix.oracle }}" = "26ai" ]; then
            docker exec -u oracle ${{ job.services.oracle.id }} bash -lc "
            echo \"set heading off feedback off pagesize 0 verify off
            select banner_full from v\\\$version where banner_full like 'Oracle Database%';
            exit;\" | sqlplus -L -s system/oracle@FREEPDB1
            "
          else
            docker exec -u oracle ${{ job.services.oracle.id }} bash -lc "
            export TNS_ADMIN=/u01/app/oracle/wallets/tls_wallet
            echo \"set heading off feedback off pagesize 0 verify off
            select banner_full from v\\\$version where banner_full like 'Oracle Database%';
            exit;\" | sqlplus -L -s admin/SecureDb1234@myatp_low
            "
          fi
          echo
          echo "Laravel package version:"
          if composer show laravel/framework >/dev/null 2>&1; then
            composer show laravel/framework
          elif composer show illuminate/database >/dev/null 2>&1; then
            composer show illuminate/database
          else
            composer show | grep -E '^(laravel/framework|illuminate/database) '
          fi

      - name: Execute tests
        env:
          ORACLE_USER: laravel_oci8
          ORACLE_PASSWORD: LaravelOci8_123!
          ORACLE_SECOND_USER: second_connection
          ORACLE_SECOND_PASSWORD: ${{ (matrix.oracle == '19c' || matrix.oracle == '23ai') && 'SecondConnection1!' || 'second_connection' }}
        run: |
          mkdir -p build/coverage
          COVERAGE_FILE="build/coverage/oracle-php-${{ matrix.php }}-${{ matrix.oracle }}.cov"
          if [ "${{ matrix.oracle }}" = "19c" ]; then
            SERVER_VERSION=19c SERVICE_NAME=myatp DATABASE=myatp_low vendor/bin/phpunit --coverage-php "$COVERAGE_FILE"
          elif [ "${{ matrix.oracle }}" = "23ai" ]; then
            SERVER_VERSION=23ai SERVICE_NAME=myatp DATABASE=myatp_low vendor/bin/phpunit --coverage-php "$COVERAGE_FILE"
          elif [ "${{ matrix.oracle }}" = "21c" ]; then
            SERVER_VERSION=12c SERVICE_NAME=XEPDB1 DATABASE=XEPDB1 vendor/bin/phpunit --coverage-php "$COVERAGE_FILE"
          elif [ "${{ matrix.oracle }}" = "26ai" ]; then
            SERVER_VERSION=26ai SERVICE_NAME=FREEPDB1 DATABASE=FREEPDB1 vendor/bin/phpunit --coverage-php "$COVERAGE_FILE"
          else
            vendor/bin/phpunit --coverage-php "$COVERAGE_FILE"
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-oracle-php-${{ matrix.php }}-${{ matrix.oracle }}
          path: build/coverage/*.cov
          if-no-files-found: error
          retention-days: 1

  compatibility-pgsql-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: [8.3, 8.4, 8.5]
        stability: [prefer-stable]

    name: Compatibility Tests (PHP ${{ matrix.php }} · Oracle ↔ PgSQL) - STABILITY ${{ matrix.stability }}

    services:
      pgsql:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: oci8, pdo_pgsql
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        uses: nick-invision/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 5
          command: composer update --${{ matrix.stability }} --prefer-dist --no-interaction --no-progress

      - name: Initialize PostgreSQL (second_connection)
        run: |
          psql "postgresql://postgres:postgres@localhost:5432/postgres" <<'SQL'
          CREATE USER second_connection WITH PASSWORD 'second_connection';
          CREATE DATABASE second_connection OWNER second_connection;
          GRANT ALL PRIVILEGES ON DATABASE second_connection TO second_connection;
          SQL

      - name: Run compatibility tests
        env:
          SERVER_VERSION: 12c
          PGSQL: true
        run: vendor/bin/phpunit tests/Functional/Compatibility/

  compatibility-mariadb-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: [8.3, 8.4, 8.5]
        stability: [prefer-stable]

    name: Compatibility Tests (PHP ${{ matrix.php }} · MariaDB) - STABILITY ${{ matrix.stability }}

    services:
      mariadb:
        image: mariadb:11
        ports:
          - 3306:3306
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: root

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: oci8, pdo_mysql
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        uses: nick-invision/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 5
          command: composer update --${{ matrix.stability }} --prefer-dist --no-interaction --no-progress

      - name: Initialize MariaDB (second_connection)
        run: |
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "
          CREATE DATABASE IF NOT EXISTS second_connection;
          CREATE USER IF NOT EXISTS 'second_connection'@'%' IDENTIFIED BY 'second_connection';
          GRANT ALL PRIVILEGES ON second_connection.* TO 'second_connection'@'%';
          FLUSH PRIVILEGES;
          "

      - name: Run MariaDB compatibility tests
        env:
          SERVER_VERSION: 12c
          MARIADB: true
        run: vendor/bin/phpunit tests/Functional/Compatibility/

  coverage:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && 'coverage-master' || format('coverage-{0}', github.run_id) }}
      cancel-in-progress: false
    permissions:
      actions: read
      contents: write
    needs:
      - tests

    name: Merge and show coverage

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          coverage: xdebug

      - name: Install PHPCOV
        run: |
          curl -Ls https://phar.phpunit.de/phpcov-11.0.phar -o phpcov
          chmod +x phpcov
          ./phpcov --version

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-oracle-*
          path: build/coverage
          merge-multiple: true

      - name: Merge coverage
        run: |
          mkdir -p build/logs
          ./phpcov merge \
            --clover build/logs/clover.xml \
            --text build/logs/coverage.txt \
            build/coverage

      - name: Show coverage
        run: cat build/logs/coverage.txt

      - name: Generate coverage badge
        run: |
          php <<'PHP'
          <?php

          $coverage = simplexml_load_file('build/logs/clover.xml');
          $metrics = $coverage->project->metrics;
          $statements = (int) $metrics['statements'];
          $coveredStatements = (int) $metrics['coveredstatements'];
          $percentage = $statements > 0 ? round(($coveredStatements / $statements) * 100, 2) : 0;
          $label = 'Coverage';
          $value = $percentage . '%';
          $color = match (true) {
              $percentage >= 90 => '#4c1',
              $percentage >= 80 => '#97ca00',
              $percentage >= 70 => '#dfb317',
              default => '#e05d44',
          };
          $labelWidth = 70;
          $valueWidth = max(46, strlen($value) * 7 + 12);
          $width = $labelWidth + $valueWidth;
          $valueX = $labelWidth + ($valueWidth / 2);
          $label = htmlspecialchars($label, ENT_QUOTES, 'UTF-8');
          $value = htmlspecialchars($value, ENT_QUOTES, 'UTF-8');

          file_put_contents('build/logs/coverage.svg', <<<SVG
          <svg xmlns="http://www.w3.org/2000/svg" width="$width" height="20" role="img" aria-label="$label: $value">
            <title>$label: $value</title>
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <clipPath id="r">
              <rect width="$width" height="20" rx="3" fill="#fff"/>
            </clipPath>
            <g clip-path="url(#r)">
              <rect width="$labelWidth" height="20" fill="#555"/>
              <rect x="$labelWidth" width="$valueWidth" height="20" fill="$color"/>
              <rect width="$width" height="20" fill="url(#s)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="11">
              <text x="35" y="15" fill="#010101" fill-opacity=".3">$label</text>
              <text x="35" y="14">$label</text>
              <text x="$valueX" y="15" fill="#010101" fill-opacity=".3">$value</text>
              <text x="$valueX" y="14">$value</text>
            </g>
          </svg>
          SVG);
          PHP

      - name: Publish coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin coverage-report:refs/remotes/origin/coverage-report || true
          if git show-ref --verify --quiet refs/remotes/origin/coverage-report; then
            git worktree add -B coverage-report /tmp/coverage-badge origin/coverage-report
          else
            git worktree add --detach /tmp/coverage-badge
            cd /tmp/coverage-badge
            git checkout --orphan coverage-report
            git reset
          fi
          cd /tmp/coverage-badge
          mkdir -p badges
          cp "$GITHUB_WORKSPACE/build/logs/coverage.svg" badges/coverage.svg
          git add badges/coverage.svg
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update coverage badge"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" coverage-report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload merged coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-merged
          path: |
            build/logs/clover.xml
            build/logs/coverage.txt
            build/logs/coverage.svg
          if-no-files-found: error
